<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#041226"/><stop offset="0.6" stop-color="#080B28"/><stop offset="1" stop-color="#140B33"/>
    </linearGradient>
    <linearGradient id="headline" x1="80" y1="0" x2="1100" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14D8FF"/><stop offset="1" stop-color="#BB60FF"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17D8FF"/><stop offset="1" stop-color="#B65FFF"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- HEADER: title y=106 subtitle y=164 — content starts y=228 -->
