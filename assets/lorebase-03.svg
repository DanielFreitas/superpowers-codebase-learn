  <!-- box 3 executing y=516–644 text y=588 -->
  <rect x="80" y="516" width="380" height="128" rx="24" fill="#0E1530" stroke="#1FD8FF" stroke-width="2"/>
  <text x="122" y="588" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Segoe UI,Arial,sans-serif">executing</text>
  <!-- box 4 testing + review y=660–788 text y=732 -->
  <rect x="80" y="660" width="380" height="128" rx="24" fill="#0E1530" stroke="#8D5DFF" stroke-width="2"/>
  <text x="122" y="732" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Segoe UI,Arial,sans-serif">testing + review</text>

  <!-- CENTER: agent circle cx=790 cy=528 r=110 — gap to col-A (x=460): 220px -->
