  <rect x="80" y="228" width="380" height="128" rx="24" fill="#0E1530" stroke="#1FD8FF" stroke-width="2"/>
  <text x="122" y="300" fill="#FFFFFF" font-size="32" font-weight="700" font-family="Segoe UI,Arial,sans-serif">brainstorming</text>
  <!-- box 2 writing plans y=372–500 text y=444 -->
  <rect x="80" y="372" width="380" height="128" rx="24" fill="#0E1530" stroke="#1FD8FF" stroke-width="2"/>
