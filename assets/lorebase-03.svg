  <circle cx="790" cy="528" r="138" stroke="#1BD8FF" stroke-opacity="0.14" stroke-width="2"/>
  <circle cx="766" cy="522" r="13" fill="#4CE2FF"/>
  <circle cx="814" cy="522" r="13" fill="#4CE2FF"/>
  <rect x="774" y="562" width="72" height="10" rx="6" fill="#A45FFF"/>
  <!-- connectors left -->
  <path d="M460 292C570 292 620 428 680 468" stroke="url(#beam)" stroke-width="4" stroke-linecap="round"/>
  <path d="M460 436C570 436 640 500 680 518" stroke="url(#beam)" stroke-width="4" stroke-linecap="round"/>
  <path d="M460 580C570 580 640 556 680 546" stroke="url(#beam)" stroke-width="4" stroke-linecap="round"/>
  <path d="M460 724C570 724 620 632 680 588" stroke="url(#beam)" stroke-width="4" stroke-linecap="round"/>
