<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#041226"/><stop offset="0.55" stop-color="#090B26"/><stop offset="1" stop-color="#140B33"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 700) scale(500 300)">
      <stop stop-color="#0AD8FF" stop-opacity="0.18"/><stop offset="1" stop-color="#0AD8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1350 200) scale(400 280)">
      <stop stop-color="#B04CFF" stop-opacity="0.20"/><stop offset="1" stop-color="#B04CFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="brand" x1="80" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12D7FF"/><stop offset="1" stop-color="#BF63FF"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17D8FF"/><stop offset="1" stop-color="#B956FF"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glowA)"/>
  <rect width="1600" height="900" fill="url(#glowB)"/>

  <!-- HEADER: title baseline=110, subtitle baseline=175 -->
  <text x="80" y="110" fill="white" font-size="88" font-weight="800" font-family="Segoe UI,Arial,sans-serif">Lorebase</text>
  <text x="80" y="175" fill="url(#brand)" font-size="42" font-weight="700" font-family="Segoe UI,Arial,sans-serif">Memória viva do seu codebase.</text>

  <!-- COLUMN A: file tree panel (x=80–540, y=228–732) -->
  <rect x="80" y="228" width="460" height="504" rx="26" fill="#0B122C" stroke="#2E4FB6" stroke-opacity="0.55" stroke-width="2"/>
  <rect x="80" y="228" width="460" height="56" rx="26" fill="#161D3C"/>
  <circle cx="116" cy="256" r="9" fill="#6173A8"/>
  <circle cx="144" cy="256" r="9" fill="#6173A8"/>
  <circle cx="172" cy="256" r="9" fill="#6173A8"/>

  <!-- item .github/   box y=296–354 text y=332 cap-top=313 -->
