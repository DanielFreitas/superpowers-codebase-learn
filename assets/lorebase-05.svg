  <path d="M1200 303C1100 303 980 340 970 370" stroke="url(#ring)" stroke-width="4" stroke-linecap="round"/>
  <path d="M400 637C500 637 620 610 630 580" stroke="url(#ring)" stroke-width="4" stroke-linecap="round"/>
